<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quality Engineering Hub | BTG Pactual &amp; Amaris</title>

  <!-- Dependencias externas -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <link  href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-900 text-slate-200">

  <!-- ── Sidebar — navegación inyectada por SidebarBuilder ─────────────── -->
  <aside id="sidebar"
    class="fixed left-0 top-0 h-screen w-72 bg-slate-950 border-r border-slate-800 z-50 transition-transform -translate-x-full lg:translate-x-0">

    <div class="p-6">
      <div class="flex items-center gap-3 mb-8">
        <div id="brand-abbr"
          class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white"></div>
        <div>
          <h1 id="brand-name"     class="font-bold text-lg leading-tight"></h1>
          <p  id="brand-subtitle" class="text-xs text-slate-500 uppercase tracking-widest"></p>
        </div>
      </div>
      <!-- Botones generados por SidebarBuilder desde SITE_CONFIG.nav -->
      <nav id="sidebar-nav" class="space-y-1"></nav>
    </div>

    <div class="absolute bottom-0 w-full p-6 border-t border-slate-800 bg-slate-950">
      <div class="flex items-center gap-3">
        <div id="partner-abbr"
          class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-xs"></div>
        <div class="text-xs">
          <p id="partner-name"     class="font-semibold text-slate-300"></p>
          <p id="partner-subtitle" class="text-slate-500"></p>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Main ──────────────────────────────────────────────────────────── -->
  <main class="lg:ml-72 min-h-screen">

    <header class="sticky top-0 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 z-40 px-6 py-4 flex items-center justify-between">
      <button id="mobile-menu-btn" class="lg:hidden p-2 text-slate-400">
        <i data-lucide="menu"></i>
      </button>
      <div class="relative w-full max-w-xl">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
        <input id="search-input" type="text"
          class="w-full bg-slate-950 border border-slate-800 rounded-full py-2 pl-10 pr-4 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
      </div>
      <div class="flex items-center gap-4">
        <span id="version-badge" class="hidden md:block text-xs text-slate-500"></span>
        <button class="p-2 bg-slate-800 rounded-full hover:bg-slate-700 transition-all">
          <i data-lucide="bell" class="w-4 h-4"></i>
        </button>
      </div>
    </header>

    <!-- Área de contenido — las secciones son inyectadas por SectionRegistry -->
    <div id="content-area" class="p-8 max-w-5xl mx-auto"></div>

  </main>

  <!-- Prism — syntax highlighting (debe cargar antes que app.js) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

  <!-- Raíz de la aplicación (ES Modules) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
